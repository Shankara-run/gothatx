<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katana Strike</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 600px;
            padding: 0 10px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #ff4444;
            letter-spacing: 3px;
        }

        .round-indicator {
            font-size: 18px;
            color: #ff8800;
        }

        .instruction-box {
            font-size: 32px;
            font-weight: 700;
            color: #00ff88;
            text-align: center;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameCanvas {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: crosshair;
        }

        .footer {
            width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .timer-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8800, #00ff88);
            border-radius: 3px;
        }

        .score-display {
            font-size: 18px;
            color: #00ff88;
        }

        .score-display.failed {
            color: #ff4444;
        }

        .status-text {
            font-size: 14px;
            color: #666;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 700;
            color: #ff4444;
        }

        .modal-score {
            font-size: 42px;
            color: #00ff88;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-retry {
            background: #00ff88;
            color: #0a0a0a;
        }

        .btn-retry:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .btn-exit {
            background: #333;
            color: #fff;
        }

        .btn-exit:hover {
            background: #444;
            transform: scale(1.05);
        }

        .level-btn {
            background: #333;
            color: #fff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .level-btn.selected {
            background: #ff4444;
            color: #fff;
            box-shadow: 0 0 20px #ff4444;
        }

        .level-btn:hover {
            transform: scale(1.1);
        }

        .level-selector {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .start-modal .btn-start {
            background: linear-gradient(135deg, #ff4444, #ff8800);
            color: #fff;
            font-size: 20px;
            padding: 16px 50px;
        }

        .start-modal .btn-start:hover {
            transform: scale(1.1);
        }

        .instructions {
            font-size: 14px;
            color: #666;
            text-align: center;
            max-width: 350px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">KATANA</div>
            <div class="round-indicator" id="roundIndicator">1/4</div>
        </div>
        <div class="instruction-box" id="instructionBox">GET READY</div>
        <canvas id="gameCanvas" width="600" height="300"></canvas>
        <div class="footer">
            <div class="timer-container">
                <div class="timer-bar" id="timerBar"></div>
            </div>
            <div class="score-display" id="scoreDisplay">0</div>
            <div class="status-text" id="statusText">Click START</div>
        </div>
    </div>

    <div class="modal start-modal active" id="startModal">
        <div class="modal-title">KATANA STRIKE</div>
        <div class="instructions">
            Select difficulty, then click START.<br>
            Click + drag + release within 1 sec.
        </div>
        <div class="level-selector">
            <button class="btn level-btn" data-level="1">1</button>
            <button class="btn level-btn" data-level="2">2</button>
            <button class="btn level-btn" data-level="3">3</button>
            <button class="btn level-btn" data-level="4">4</button>
            <button class="btn level-btn" data-level="5">5</button>
        </div>
        <button class="btn btn-start" id="startBtn">START</button>
    </div>

    <div class="modal" id="endModal">
        <div class="modal-title" id="endTitle">GAME OVER</div>
        <div class="modal-score" id="finalScore">0</div>
        <div class="modal-buttons">
            <button class="btn btn-retry" id="retryBtn">RETRY</button>
            <button class="btn btn-exit" id="exitBtn">EXIT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerBar = document.getElementById('timerBar');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const statusText = document.getElementById('statusText');
        const roundIndicator = document.getElementById('roundIndicator');
        const instructionBox = document.getElementById('instructionBox');
        const startModal = document.getElementById('startModal');
        const endModal = document.getElementById('endModal');
        const endTitle = document.getElementById('endTitle');
        const finalScore = document.getElementById('finalScore');

        const ROUNDS = [
            { name: 'Horizontal', dir: { x: 1, y: 0 } },
            { name: 'Vertical', dir: { x: 0, y: 1 } },
            { name: 'Right Diagonal', dir: { x: 1, y: 1 } },
            { name: 'Left Diagonal', dir: { x: -1, y: 1 } }
        ];

        const DIFFICULTIES = {
            1: { maxDevAngle: 35, timePenaltyStart: 800, passThreshold: 40 },
            2: { maxDevAngle: 25, timePenaltyStart: 600, passThreshold: 50 },
            3: { maxDevAngle: 18, timePenaltyStart: 500, passThreshold: 60 },
            4: { maxDevAngle: 12, timePenaltyStart: 400, passThreshold: 70 },
            5: { maxDevAngle: 8, timePenaltyStart: 300, passThreshold: 75 }
        };

        const TIME_LIMIT = 1000;
        let currentRound = 0;
        let totalScore = 0;
        let isDrawing = false;
        let playerStroke = [];
        let canDraw = false;
        let timerStarted = false;
        let timerInterval = null;
        let timeRemaining = TIME_LIMIT;
        let gameActive = false;
        let difficulty = 1;

        function clearCanvas() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawTargetPreview();
        }

        function drawTargetPreview() {
            const target = ROUNDS[currentRound].dir;
            const previewSize = 30;
            const margin = 30;
            const startX = canvas.width - margin - previewSize;
            const startY = margin + previewSize / 2;
            const endX = startX + target.x * previewSize;
            const endY = startY + target.y * previewSize;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 3;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(startX, startY, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.arc(endX, endY, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPlayerStroke() {
            if (playerStroke.length < 2) return;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(playerStroke[0].x, playerStroke[0].y);
            for (let i = 1; i < playerStroke.length; i++) {
                ctx.lineTo(playerStroke[i].x, playerStroke[i].y);
            }
            ctx.stroke();
        }

        function calculateScore() {
            if (playerStroke.length < 5) return 0;
            
            const diff = DIFFICULTIES[difficulty];
            const target = ROUNDS[currentRound].dir;
            const targetLen = Math.sqrt(target.x * target.x + target.y * target.y);
            const targetNormX = target.x / targetLen;
            const targetNormY = target.y / targetLen;
            
            const start = playerStroke[0];
            const end = playerStroke[playerStroke.length - 1];
            const strokeDx = end.x - start.x;
            const strokeDy = end.y - start.y;
            const strokeLen = Math.sqrt(strokeDx * strokeDx + strokeDy * strokeDy);
            
            if (strokeLen < 40) return 0;
            
            let totalAngleScore = 0;
            let segmentsUsed = 0;
            let maxDevAngle = 0;
            
            for (let i = 1; i < playerStroke.length; i++) {
                const dx = playerStroke[i].x - playerStroke[i-1].x;
                const dy = playerStroke[i].y - playerStroke[i-1].y;
                const segLen = Math.sqrt(dx * dx + dy * dy);
                
                if (segLen < 2) continue;
                
                const segNormX = dx / segLen;
                const segNormY = dy / segLen;
                
                const dot = segNormX * targetNormX + segNormY * targetNormY;
                const angleDev = Math.acos(Math.max(-1, Math.min(1, dot)));
                const angleDeg = angleDev * 180 / Math.PI;
                
                maxDevAngle = Math.max(maxDevAngle, angleDeg);
                totalAngleScore += dot;
                segmentsUsed++;
            }
            
            if (segmentsUsed < 2) return 0;
            
            const avgDot = totalAngleScore / segmentsUsed;
            const avgAngleScore = (avgDot + 1) / 2 * 100;
            
            const endpointNormX = strokeDx / strokeLen;
            const endpointNormY = strokeDy / strokeLen;
            const endpointDot = endpointNormX * targetNormX + endpointNormY * targetNormY;
            const endpointAngleScore = (endpointDot + 1) / 2 * 100;
            
            let accuracy = avgAngleScore * 0.7 + endpointAngleScore * 0.3;
            
            if (maxDevAngle > diff.maxDevAngle) {
                const penalty = Math.min(45, (maxDevAngle - diff.maxDevAngle) * 2);
                accuracy -= penalty;
            }
            
            accuracy = Math.max(0, Math.min(100, accuracy));
            
            const timeTaken = TIME_LIMIT - timeRemaining;
            let timeMultiplier = 1.0;
            
            if (timeTaken > diff.timePenaltyStart) {
                timeMultiplier = 0.7;
            } else if (timeTaken > diff.timePenaltyStart - 150) {
                timeMultiplier = 0.85;
            }
            
            const finalScore = Math.round(accuracy * timeMultiplier);
            return Math.min(100, Math.max(0, finalScore));
        }

        function startTimer() {
            timeRemaining = TIME_LIMIT;
            timerStarted = true;
            timerBar.style.width = '100%';
            timerInterval = setInterval(() => {
                timeRemaining -= 16;
                timerBar.style.width = (timeRemaining / TIME_LIMIT * 100) + '%';
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    endRound(false, 0);
                }
            }, 16);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerStarted = false;
            timerBar.style.width = '100%';
        }

        function showResult(cleared, score) {
            if (cleared) {
                scoreDisplay.textContent = Math.round(score) + '';
                scoreDisplay.classList.remove('failed');
            } else {
                scoreDisplay.textContent = '0';
                scoreDisplay.classList.add('failed');
            }
        }

        function endRound(passed, score) {
            canDraw = false;
            isDrawing = false;
            stopTimer();
            
            const safeScore = Math.max(0, Math.min(100, Math.round(score)));
            const scoreToShow = passed ? safeScore : 0;
            playerStroke = [];
            
            showResult(passed, scoreToShow);
            
            if (passed) totalScore += scoreToShow;
            
            setTimeout(() => {
                scoreDisplay.classList.remove('failed');
                currentRound++;
                
                if (currentRound >= 4) {
                    endGame();
                } else {
                    roundIndicator.textContent = (currentRound + 1) + '/4';
                    setTimeout(startRound, 300);
                }
            }, 500);
        }

        function startRound() {
            const round = ROUNDS[currentRound];
            instructionBox.textContent = round.name.toUpperCase();
            statusText.textContent = '';
            scoreDisplay.textContent = '...';
            clearCanvas();
            canDraw = true;
        }

        function endGame() {
            gameActive = false;
            endTitle.textContent = totalScore >= 280 ? 'PERFECT!' : 'GAME OVER';
            finalScore.textContent = totalScore + '/400';
            instructionBox.textContent = 'DONE';
            endModal.classList.add('active');
        }

        function resetGame() {
            currentRound = 0;
            totalScore = 0;
            playerStroke = [];
            roundIndicator.textContent = '1/4';
            scoreDisplay.textContent = '0';
            instructionBox.textContent = 'GET READY';
            statusText.textContent = 'Click START';
            endModal.classList.remove('active');
            startModal.classList.add('active');
            clearCanvas();
        }

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                difficulty = parseInt(btn.dataset.level);
            });
        });

        document.querySelector('.level-btn[data-level="1"]').classList.add('selected');

        document.getElementById('startBtn').addEventListener('click', () => {
            startModal.classList.remove('active');
            gameActive = true;
            startRound();
        });

        document.getElementById('retryBtn').addEventListener('click', resetGame);
        document.getElementById('exitBtn').addEventListener('click', () => {
            document.querySelector('.modal-buttons').style.display = 'none';
            endTitle.textContent = 'THANKS';
            finalScore.textContent = totalScore;
            setTimeout(() => {
                endModal.classList.remove('active');
                document.querySelector('.modal-buttons').style.display = 'flex';
                resetGame();
            }, 1500);
        });

        canvas.addEventListener('mousedown', (e) => {
            if (!canDraw) return;
            
            if (!timerStarted) {
                startTimer();
                statusText.textContent = '';
            }
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            isDrawing = true;
            playerStroke = [{ x, y }];
            clearCanvas();
            drawPlayerStroke();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || !canDraw) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            playerStroke.push({ x, y });
            drawPlayerStroke();
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDrawing || !canDraw) return;
            
            isDrawing = false;
            const score = calculateScore();
            const diff = DIFFICULTIES[difficulty];
            const passed = score >= diff.passThreshold;
            endRound(passed, score);
        });

        canvas.addEventListener('mouseleave', () => {
            if (isDrawing && canDraw) {
                isDrawing = false;
                const score = calculateScore();
                const diff = DIFFICULTIES[difficulty];
                const passed = score >= diff.passThreshold;
                endRound(passed, score);
            }
        });

        clearCanvas();
    </script>
</body>
</html>
